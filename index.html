<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דואר ינשופים</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Frank+Ruhl+Libre:wght@400;500;700&display=swap');

:root{
  --parchment:#ecdfc0;
  --parchment-dark:#d9c79a;
  --ink:#2a1d10;
  --midnight:#0c1220;
  --midnight2:#161f33;
  --gold:#c8a01c;
  --gold2:#b8902f;
  --maroon:#5c1a1a;
  --emerald:#1c4a3a;
}
*{box-sizing:border-box;}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(184,144,47,0.10), transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(28,74,58,0.18), transparent 50%),
    linear-gradient(180deg,#0a0e1a 0%, #111a2e 50%, #0a0e1a 100%);
  font-family:'Frank Ruhl Libre', serif;
  color:var(--parchment);
  position:relative;
  overflow-x:hidden;
}
/* stars */
.stars{
  position:fixed; inset:0; pointer-events:none; z-index:0;
}
.stars span{
  position:absolute; width:2px; height:2px; background:#f0e6c8; border-radius:50%;
  opacity:.5; animation:twinkle 4s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.8}}

.wrap{
  position:relative; z-index:1;
  max-width:560px; margin:0 auto; padding:40px 20px 80px;
}

.brand{
  text-align:center; margin-bottom:6px;
}
.brand h1{
  font-family:'Cinzel Decorative', serif;
  font-size:2.1rem;
  margin:0;
  background:linear-gradient(180deg,#f0d98a,#b8902f);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  letter-spacing:1px;
  text-shadow:0 0 25px rgba(200,160,40,0.25);
}
.brand p{
  font-family:'Cinzel', serif;
  font-size:.72rem;
  letter-spacing:3px;
  color:#9c8a5e;
  margin:6px 0 0;
}

.owl-flight{
  text-align:center;
  font-size:2rem;
  margin:18px 0 6px;
  filter:drop-shadow(0 0 10px rgba(200,160,40,0.3));
  animation:fly 3.5s ease-in-out infinite;
}
@keyframes fly{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(-3deg)}}

.card{
  background:
    linear-gradient(180deg, var(--parchment) 0%, var(--parchment-dark) 100%);
  color:var(--ink);
  border-radius:4px;
  padding:30px 26px;
  margin-top:24px;
  position:relative;
  box-shadow:0 18px 50px rgba(0,0,0,0.55), inset 0 0 60px rgba(140,100,40,0.12);
  border:1px solid #a98c52;
}
.card::before{
  content:"";
  position:absolute; inset:6px;
  border:1px solid rgba(92,26,26,0.25);
  pointer-events:none;
}
.seal{
  position:absolute; top:-16px; right:24px;
  width:38px; height:38px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #8a2424, var(--maroon) 70%);
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
  display:flex; align-items:center; justify-content:center;
  font-family:'Cinzel Decorative', serif; font-size:.85rem; color:#e8d9a8;
}

h2{
  font-family:'Cinzel', serif;
  font-size:1.1rem;
  margin:0 0 4px;
  color:var(--maroon);
}
.sub{
  font-size:.85rem; color:#5a4a30; margin:0 0 18px; line-height:1.6;
}

label{
  display:block; font-family:'Cinzel', serif; font-size:.72rem;
  letter-spacing:1px; color:#5a4a30; margin-bottom:6px;
}
input[type=text], textarea{
  width:100%;
  font-family:'Frank Ruhl Libre', serif;
  font-size:1rem;
  padding:12px 14px;
  border:1px solid #a98c52;
  border-radius:3px;
  background:#f7eed8;
  color:var(--ink);
  outline:none;
  transition:box-shadow .2s, border-color .2s;
}
input[type=text]:focus, textarea:focus{
  border-color:var(--maroon);
  box-shadow:0 0 0 3px rgba(92,26,26,0.12);
}
textarea{min-height:110px; resize:vertical; line-height:1.6;}

.btn{
  font-family:'Cinzel', serif;
  letter-spacing:1px;
  font-size:.85rem;
  border:none;
  border-radius:3px;
  padding:13px 20px;
  cursor:pointer;
  width:100%;
  margin-top:16px;
  background:linear-gradient(180deg, var(--emerald), #123226);
  color:#e8d9a8;
  box-shadow:0 6px 16px rgba(0,0,0,0.3);
  transition:transform .15s, box-shadow .15s, filter .15s;
}
.btn:hover{transform:translateY(-2px); filter:brightness(1.1); box-shadow:0 10px 22px rgba(0,0,0,0.35);}
.btn:active{transform:translateY(0);}
.btn.maroon{background:linear-gradient(180deg, var(--maroon), #3a0f0f);}
.btn:disabled{opacity:.5; cursor:default; transform:none;}

.link-box{
  margin-top:16px;
  display:flex; gap:8px;
  align-items:center;
}
.link-box input{
  flex:1; font-size:.85rem; background:#f0e4c2;
}
.copy-btn{
  font-family:'Cinzel', serif; font-size:.72rem; letter-spacing:1px;
  padding:12px 14px; border:1px solid var(--maroon); background:transparent;
  color:var(--maroon); border-radius:3px; cursor:pointer; white-space:nowrap;
}
.copy-btn:hover{background:var(--maroon); color:#f0e4c2;}

.tabs{
  display:flex; gap:10px; justify-content:center; margin-top:28px;
}
.tab{
  font-family:'Cinzel', serif; font-size:.75rem; letter-spacing:1px;
  padding:8px 16px; border-radius:20px; cursor:pointer;
  border:1px solid #4a3f2a; color:#9c8a5e; background:transparent;
}
.tab.active{background:var(--gold2); color:#1a1206; border-color:var(--gold2);}

.letters{margin-top:18px; display:flex; flex-direction:column; gap:16px;}
.letter{
  background:linear-gradient(180deg, var(--parchment) 0%, var(--parchment-dark) 100%);
  color:var(--ink);
  border-radius:3px; padding:18px 20px;
  border:1px solid #a98c52;
  box-shadow:0 8px 20px rgba(0,0,0,0.35);
  position:relative;
  animation:unfold .4s ease;
}
@keyframes unfold{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:translateY(0)}}
.letter .meta{
  font-family:'Cinzel', serif; font-size:.65rem; color:#8a6a30; letter-spacing:1px; margin-bottom:8px;
}
.letter p{margin:0; line-height:1.7; font-size:.98rem;}

.empty{
  text-align:center; color:#7a6a4a; font-size:.9rem; padding:30px 10px; font-style:italic;
}

.foot{
  text-align:center; margin-top:36px; font-size:.7rem; color:#5a4f38; letter-spacing:1px;
  font-family:'Cinzel', serif;
}

.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--maroon); color:#f0e4c2; padding:10px 20px; border-radius:30px;
  font-family:'Cinzel', serif; font-size:.78rem; letter-spacing:1px;
  opacity:0; transition:opacity .3s, transform .3s; pointer-events:none;
  box-shadow:0 8px 20px rgba(0,0,0,0.4); z-index:50;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

.spinner{
  display:inline-block; width:14px; height:14px; border:2px solid rgba(0,0,0,0.2);
  border-top-color:var(--maroon); border-radius:50%; animation:spin .7s linear infinite;
  vertical-align:middle; margin-left:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.hint{font-size:.78rem; color:#7a6a4a; margin-top:8px;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrap">
  <div class="brand">
    <h1>דואר ינשופים</h1>
    <p>מסרים אנונימיים מעבר לחושך</p>
  </div>
  <div class="owl-flight">🦉</div>

  <div id="app"></div>

  <div class="foot">✦ נשלח באמצעות ינשוף נאמן ✦</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---------- stars background ----------
(function(){
  const s = document.getElementById('stars');
  for(let i=0;i<60;i++){
    const d = document.createElement('span');
    d.style.left = Math.random()*100+'%';
    d.style.top = Math.random()*100+'%';
    d.style.animationDelay = (Math.random()*4)+'s';
    s.appendChild(d);
  }
})();

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function normalizeName(name){
  return name.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^\u0590-\u05FFa-z0-9\-_]/g,'');
}

function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

const app = document.getElementById('app');

async function safeGet(key, shared){
  try{
    const r = await window.storage.get(key, shared);
    return r ? r.value : null;
  }catch(e){ return null; }
}
async function safeSet(key, value, shared){
  try{ return await window.storage.set(key, value, shared); }
  catch(e){ console.error(e); return null; }
}

// ---------- ROUTES ----------
const toUser = getParam('to');

if(toUser){
  renderSendView(toUser);
}else{
  renderHomeView();
}

// ---------- HOME: create / view inbox ----------
function renderHomeView(){
  app.innerHTML = `
    <div class="card">
      <div class="seal">✦</div>
      <h2>פתח תיבת מכתבים</h2>
      <p class="sub">בחרו שם (כינוי) שישמש אתכם בלבד. שתפו את הקישור שתקבלו עם חברים – הם יוכלו לשלוח לכם מכתב מבלי לחשוף את זהותם.</p>
      <label for="username">השם שלי</label>
      <input type="text" id="username" placeholder="לדוגמה: hermione" autocomplete="off">
      <button class="btn" id="createBtn">פתח תיבה / היכנס לתיבה שלי</button>
      <p class="hint" id="homeHint"></p>
    </div>
  `;
  document.getElementById('createBtn').addEventListener('click', async ()=>{
    const raw = document.getElementById('username').value;
    const uname = normalizeName(raw);
    const hint = document.getElementById('homeHint');
    if(!uname){
      hint.textContent = 'יש להזין שם תקין (אותיות/מספרים).';
      return;
    }
    hint.innerHTML = 'בודק... <span class="spinner"></span>';
    await safeSet('owlpost:user:'+uname, JSON.stringify({createdAt: Date.now()}), true);
    renderInboxView(uname);
  });
}

// ---------- INBOX VIEW ----------
async function renderInboxView(uname){
  const shareUrl = window.location.origin + window.location.pathname + '?to=' + encodeURIComponent(uname);
  app.innerHTML = `
    <div class="card">
      <div class="seal">✦</div>
      <h2>תיבת המכתבים של ${escapeHtml(uname)}</h2>
      <p class="sub">שתפו את הקישור הבא — כל מי שילחץ עליו יוכל לשלוח לכם מכתב אנונימי.</p>
      <div class="link-box">
        <input type="text" id="shareLink" value="${shareUrl}" readonly>
        <button class="copy-btn" id="copyBtn">העתק</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" id="tabHome">← תיבה חדשה</div>
      <div class="tab" id="tabRefresh">רענון 🦉</div>
    </div>
    <div class="letters" id="letters">
      <div class="empty">מביא מכתבים... <span class="spinner"></span></div>
    </div>
  `;
  document.getElementById('copyBtn').addEventListener('click', ()=>{
    const inp = document.getElementById('shareLink');
    inp.select();
    navigator.clipboard?.writeText(inp.value).then(()=>toast('הקישור הועתק! 🦉')).catch(()=>{
      document.execCommand('copy'); toast('הקישור הועתק!');
    });
  });
  document.getElementById('tabHome').addEventListener('click', renderHomeView);
  document.getElementById('tabRefresh').addEventListener('click', ()=>loadLetters(uname));

  loadLetters(uname);
}

async function loadLetters(uname){
  const box = document.getElementById('letters');
  box.innerHTML = `<div class="empty">מביא מכתבים... <span class="spinner"></span></div>`;
  const raw = await safeGet('owlpost:inbox:'+uname, true);
  let msgs = [];
  if(raw){
    try{ msgs = JSON.parse(raw); }catch(e){ msgs = []; }
  }
  if(!msgs.length){
    box.innerHTML = `<div class="empty">עדיין לא הגיעו מכתבים. שלחו את הקישור שלכם כדי לקבל את הראשון! 🦉</div>`;
    return;
  }
  msgs.sort((a,b)=> b.t - a.t);
  box.innerHTML = msgs.map(m => `
    <div class="letter">
      <div class="meta">נשלח ב-${new Date(m.t).toLocaleString('he-IL')} · שולח אלמוני</div>
      <p>${escapeHtml(m.text)}</p>
    </div>
  `).join('');
}

// ---------- SEND VIEW ----------
async function renderSendView(rawTo){
  const uname = normalizeName(rawTo);
  app.innerHTML = `
    <div class="card">
      <div class="seal">✦</div>
      <h2>שלחו מכתב אנונימי אל ${escapeHtml(uname)}</h2>
      <p class="sub">הזהות שלכם לא תיחשף לעולם. הינשוף ידע לשמור סוד.</p>
      <label for="msgText">המכתב שלכם</label>
      <textarea id="msgText" placeholder="כתבו כאן את המסר..."></textarea>
      <button class="btn maroon" id="sendBtn">שלח באמצעות ינשוף 🦉</button>
      <p class="hint" id="sendHint"></p>
    </div>
    <div class="tabs">
      <div class="tab" id="tabCreate">רוצים תיבה משלכם? פתחו אחת ←</div>
    </div>
  `;
  document.getElementById('tabCreate').addEventListener('click', renderHomeView);

  document.getElementById('sendBtn').addEventListener('click', async ()=>{
    const ta = document.getElementById('msgText');
    const hint = document.getElementById('sendHint');
    const text = ta.value.trim();
    if(!text){
      hint.textContent = 'כתבו משהו לפני שליחה.';
      return;
    }
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    hint.innerHTML = 'הינשוף ממריא... <span class="spinner"></span>';

    const key = 'owlpost:inbox:'+uname;
    let msgs = [];
    const existing = await safeGet(key, true);
    if(existing){
      try{ msgs = JSON.parse(existing); }catch(e){ msgs = []; }
    }
    msgs.push({text: text, t: Date.now()});
    const ok = await safeSet(key, JSON.stringify(msgs), true);
    if(ok){
      app.innerHTML = `
        <div class="card" style="text-align:center;">
          <div class="seal">✦</div>
          <h2>נשלח בהצלחה!</h2>
          <p class="sub" style="margin-top:14px;">הינשוף בדרך אל ${escapeHtml(uname)}. המכתב שלכם יישאר אנונימי.</p>
          <button class="btn" id="sendAnother">שלח עוד מכתב</button>
        </div>
        <div class="tabs">
          <div class="tab" id="tabCreate2">פתחו תיבה משלכם ←</div>
        </div>
      `;
      document.getElementById('sendAnother').addEventListener('click', ()=>renderSendView(uname));
      document.getElementById('tabCreate2').addEventListener('click', renderHomeView);
    }else{
      btn.disabled = false;
      hint.textContent = 'אירעה שגיאה בשליחה. נסו שוב.';
    }
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
